<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloud Native Calculator</title>
    <style>
      body {
        font-family: "Inter", system-ui, sans-serif;
        background-color: #f3f4f6;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }
      .card {
        background: white;
        padding: 2rem;
        border-radius: 1rem;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 350px;
      }
      h2 {
        color: #111827;
        text-align: center;
        margin-bottom: 1.5rem;
      }
      label {
        display: block;
        margin-bottom: 0.5rem;
        font-size: 0.875rem;
        font-weight: 500;
        color: #374151;
      }
      input {
        width: 100%;
        padding: 0.75rem;
        margin-bottom: 1rem;
        border: 1px solid #d1d5db;
        border-radius: 0.5rem;
        box-sizing: border-box;
      }
      button {
        width: 100%;
        padding: 0.75rem;
        background-color: #6366f1;
        color: white;
        border: none;
        border-radius: 0.5rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background-color: #4f46e5;
      }
      #result-box {
        margin-top: 1.5rem;
        padding: 1rem;
        border-radius: 0.5rem;
        display: none;
        text-align: center;
        font-weight: 500;
      }
      .success {
        background-color: #ecfdf5;
        color: #065f46;
        border: 1px solid #a7f3d0;
      }
      .error {
        background-color: #fef2f2;
        color: #991b1b;
        border: 1px solid #fecaca;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Cloud Calc</h2>

      <label>Number 1</label>
      <input type="number" id="n1" placeholder="e.g. 10" />

      <label>Number 2</label>
      <input type="number" id="n2" placeholder="e.g. 5" />

      <button onclick="sendData()">Calculer la Somme</button>

      <div id="result-box"></div>
    </div>

    <script>
      async function sendData() {
        const n1 = document.getElementById("n1").value;
        const n2 = document.getElementById("n2").value;
        const resultBox = document.getElementById("result-box");

        if (!n1 || !n2) {
          showResult("Please enter both numbers", true);
          return;
        }

        try {
          // Pointing to your local Node server
          const response = await fetch("/api/v1/somme", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ n1: n1, n2: n2 }),
          });

          const data = await response.json();
          showResult(data.result, false);
        } catch (err) {
          showResult("Error: Is your API running on port 8081?", true);
        }
      }

      function showResult(text, isError) {
        const resultBox = document.getElementById("result-box");
        resultBox.style.display = "block";
        resultBox.innerText = text;
        resultBox.className = isError ? "error" : "success";
      }
    </script>
  </body>
</html>
